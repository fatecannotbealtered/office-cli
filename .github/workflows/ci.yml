name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.25', '1.26']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Tidy modules
        run: go mod tidy

      - name: Check formatting
        if: runner.os == 'Linux'
        run: test -z "$(gofmt -l .)"

      - name: Lint
        if: runner.os == 'Linux'
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -v ./...

      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          go build -o office-cli-test ./cmd/office-cli
          ./office-cli-test --help
          ./office-cli-test doctor --json

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        run: |
          go build -o office-cli-test.exe ./cmd/office-cli
          ./office-cli-test.exe --help
          ./office-cli-test.exe doctor --json

      - name: Integration tests (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x scripts/e2e-all-commands.sh
          OFFICE_CLI_BIN=./office-cli-test scripts/e2e-all-commands.sh

      - name: Integration tests (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $env:OFFICE_CLI_BIN = "./office-cli-test.exe"
          ./scripts/e2e-all-commands.ps1
